services:
  news_llm:
    build: .
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://trading:postgres@postgres:5432/trading
      - PGPASSWORD=postgres
    restart: unless-stopped
    command: sh -c "psql -h postgres -U trading -d trading -f /app/sql/003_create_table.sql && python main.py"
    networks:
      - news_agent_network

networks:
  news_agent_network:
    external: true
    name: news_agent_default
