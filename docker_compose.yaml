services:
  news_llm:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://trading:postgres@postgres:5432/trading
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
  postgres:
    image: "postgres:16-alpine"
    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trading
    ports:
      - 5432:5432
    volumes:
       - pgdata:/var/lib/postgresql/data
       - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U trading"]
      interval: 5s
      timeout: 5s
      retries: 5
  pgadmin:
    image: "dpage/pgadmin4:latest"
    ports:
      - 8080:80
    environment:
      PGADMIN_DEFAULT_EMAIL: "jay.arora@email.com"
      PGADMIN_DEFAULT_PASSWORD: "1234"
    depends_on:
      postgres: 
        condition: service_healthy
volumes:
  pgdata: null
  